spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        hbm2ddl:
          create_namespaces: true
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-bytes-long-for-hmac!!
    expiration-ms: 3600000
    remember-me-expiration-ms: 7200000

server:
  error:
    include-message: never
    include-exception: false

# Disable auction lifecycle scheduler in tests — tests call
# AuctionLifecycleService.tick() directly to drive transitions.
auctions:
  lifecycle:
    enabled: false
  # R1 init listener is off by default in tests so unit/slice tests that
  # publish RoundStartedEvent don't touch the DB. The end-to-end IT
  # (R1InitializationIT) opts in via @TestPropertySource.
  r1-init:
    enabled: false
