spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: identity
  flyway:
    enabled: true
    locations: classpath:db/migration
    # validate-on-migrate false for local dev DB (already migrated, checksums may differ)
    validate-on-migrate: false
    out-of-order: true
    schemas: identity,user_mgmt,buyer_mgmt,sso,pws,mdm,integration
    default-schema: identity
    # baseline-on-migrate allows Flyway to work with a pre-existing local dev DB
    baseline-on-migrate: true

app:
  jwt:
    secret: test-secret-key-must-be-at-least-32-bytes-long-for-hmac!!
    expiration-ms: 3600000
    remember-me-expiration-ms: 7200000

server:
  error:
    include-message: never
    include-exception: false
