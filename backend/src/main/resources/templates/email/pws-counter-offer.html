<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{email/_layout :: layout(
          title='Counter Offer Ready for Review',
          intro='Hello <strong>' + ${buyerName} + '</strong>,<br/>A counter offer is ready for offer <strong>#' + ${offerId} + '</strong> (<strong>' + ${companyName} + '</strong>). Please review the adjusted line items and respond.',
          bodyContent=~{::content})}">
<body>
<div th:fragment="content">
  <div th:replace="~{email/_rows :: itemsTable(${items}, ${total})}">Items</div>

  <!-- Counter-offer CTA button (Mendix parity: #2CB34A, ruby display) -->
  <div style="text-align: center; padding: 24px 0;">
    <a th:href="${counterOfferUrl + offerId}"
       style="background-color: #2CB34A; color: #ffffff; padding: 10px 16px; text-decoration: none; border-radius: 4px; display: inline-block; font-size: 16px; font-family: 'Trebuchet MS', Helvetica, sans-serif; font-weight: bold;">
      See Counter Offer
    </a>
  </div>
</div>
</body>
</html>
