<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Shared layout fragment for all PWS notification emails.
  Styling preserves Mendix parity (Trebuchet MS / #514F4E text / #B7B5B5 border /
  #2CB34A accent) extracted from migration_context/backend/services/SUB_SendPWS*Email.md.
  Inline styles only — email clients strip <style> blocks.
-->
<body th:fragment="layout(title, intro, bodyContent)" style="margin: 0; padding: 0; background: #ffffff;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width: 640px; margin: 0 auto; padding: 24px; font-family: 'Trebuchet MS', Helvetica, sans-serif;">
  <tr>
    <td>
      <h1 th:text="${title}"
          style="margin: 0 0 16px 0; font-size: 22px; font-weight: 700; color: #514F4E; font-family: 'Trebuchet MS', Helvetica, sans-serif;">Notification</h1>

      <p th:utext="${intro}"
         style="margin: 0 0 24px 0; font-size: 14px; line-height: 22px; color: #514F4E; font-family: 'Trebuchet MS', Helvetica, sans-serif;">Intro text.</p>

      <!-- Page-specific body injected via fragment slot -->
      <div th:insert="${bodyContent}">Body placeholder.</div>

      <!-- Footer (boilerplate from SUB_SendPWSOfferConfirmationEmail.md) -->
      <div style="display: block; padding: 16px 0px; text-align: center;">
        <span style="color: #000; text-align: center; font-family: 'Trebuchet MS', Helvetica, sans-serif; font-size: 12px; font-weight: 400; line-height: 140%;">
          This email is sent by ecoATM, LLC, 10121 Barnes Canyon Rd, San Diego, CA 92121.
          This is an automated message, please do not reply.
          Copyright 2026 &ndash; ecoATM, LLC. All Rights Reserved.
        </span>
      </div>
    </td>
  </tr>
</table>
</body>
</html>
