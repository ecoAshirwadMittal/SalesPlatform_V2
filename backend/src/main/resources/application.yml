spring:
  application:
    name: salesplatform

  # ─────────────────────────────────────
  # Load secrets from the repo-root .env (gitignored). `optional:` means
  # startup doesn't fail in CI/Docker where the file is absent; `[.properties]`
  # tells the Spring config importer to parse KEY=VALUE lines as properties.
  # Any key here (e.g. SNOWFLAKE_ENABLED, SNOWFLAKE_USERNAME) becomes
  # resolvable via ${SNOWFLAKE_ENABLED} in this file, matching OS-env behavior.
  # Shell-exported env vars still win — Spring property precedence gives OS
  # env higher priority than imported config files.
  # ─────────────────────────────────────
  config:
    import: optional:file:../.env[.properties]

  # ─────────────────────────────────────
  # Local PostgreSQL (already running)
  # ─────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/salesplatform_dev
    username: ${DB_USERNAME:salesplatform}
    password: ${DB_PASSWORD:salesplatform}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # ─────────────────────────────────────
  # JPA / Hibernate
  # validate = Hibernate checks entities match DB schema; never auto-creates
  # ─────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: identity   # default schema for @Entity classes unless overridden
        jdbc:
          batch_size: 50
          time_zone: UTC           # ensures LocalDateTime ↔ TIMESTAMPTZ uses UTC
        order_inserts: true
        order_updates: true

  # ─────────────────────────────────────
  # Mail (SMTP) — used by SmtpEmailSender when pws.email.enabled=true.
  # Defaults are harmless placeholders; real creds injected via env in QA/prod.
  # ─────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ─────────────────────────────────────
  # Flyway Migration
  # ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: true
    schemas: identity,user_mgmt,buyer_mgmt,sso,pws,mdm,integration,email,admin
    default-schema: identity  # flyway_schema_history lives in identity (matches pom.xml)

# ─────────────────────────────────────
# Actuator (health checks)
# ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Spring Boot auto-registers a JavaMail health indicator that probes the
    # SMTP host on every /actuator/health hit. With no SMTP server running
    # locally (or in CI) the rollup flips to DOWN even though the app is fully
    # functional — and the E2E test gate (`isBackendAvailable`) skips every
    # live test as a result. Mail is non-essential to the auction surface;
    # exclude the indicator from the rollup. Status is still queryable
    # individually via `/actuator/health/mail` if needed.
    mail:
      enabled: false

# ─────────────────────────────────────
# Server
# ─────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-exception: false

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-must-be-at-least-32-bytes-long!!}
    expiration-ms: 86400000
    remember-me-expiration-ms: 604800000

# ─────────────────────────────────────
# Auth cookie (Theme 3 — HttpOnly cookie-based JWT)
# Default secure=false so http://localhost dev works; QA/prod MUST set
# AUTH_COOKIE_SECURE=true (or activate the `production` profile below).
# SameSite=Strict and HttpOnly are enforced in code (non-configurable).
# ─────────────────────────────────────
auth:
  cookie:
    secure: ${AUTH_COOKIE_SECURE:false}

# ─────────────────────────────────────
# CORS allowlist — comma-separated origins. Override via CORS_ALLOWED_ORIGINS.
# ─────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.ngrok.app}

# ─────────────────────────────────────
# PWS email notifications (Theme 1)
# enabled=false → LoggingEmailSender logs each message instead of sending.
# Flip enabled=true in QA/prod after SMTP creds are wired via env.
# ─────────────────────────────────────
pws:
  email:
    enabled: ${PWS_EMAIL_ENABLED:false}
    from: ${PWS_EMAIL_FROM:noreply@ecoatmdirect.com}
    sales-address: ${PWS_EMAIL_SALES:sales@ecoatmdirect.com}
    counter-offer-url: ${PWS_EMAIL_COUNTER_OFFER_URL:https://buy.ecoatmdirect.com/p/counter-offer}

# ─────────────────────────────────────
# Buyer Snowflake sync (PWS Data Center Phase 3.3)
# enabled=false → BuyerSnowflakeListener bean is not registered; events are
# published but silently dropped. Flip enabled=true in QA/prod once the
# buyer-sync Snowflake integration is wired.
# ─────────────────────────────────────
buyers:
  snowflake:
    enabled: ${BUYERS_SNOWFLAKE_ENABLED:false}

# ─────────────────────────────────────
# Snowflake (Theme 2 — aggregated inventory sync infrastructure)
# enabled=false → SnowflakeDataSourceConfig bean is not registered, so no
# connection is ever attempted in dev/test. Flip enabled=true in QA/prod
# after credentials are wired via env. Real creds live in .env (gitignored).
# ─────────────────────────────────────
snowflake:
  enabled: ${SNOWFLAKE_ENABLED:false}
  jdbc-url: ${SNOWFLAKE_JDBC_URL:jdbc:snowflake://ecoatm.snowflakecomputing.com/?db=ECO_DEV&schema=AUCTIONS&TIMEZONE=UTC}
  username: ${SNOWFLAKE_USERNAME:}
  password: ${SNOWFLAKE_PASSWORD:}
  pool:
    maximum-size: ${SNOWFLAKE_POOL_MAX:3}

# ─────────────────────────────────────
# Auction lifecycle scheduler (Sub-project 0)
# enabled=false → @Scheduled tick is suppressed; round transitions are only
# driven by direct service.tick() calls (used in tests). Polls every poll-ms
# milliseconds when enabled. Mirrors Mendix scheduled-event interval (60s).
# ─────────────────────────────────────
# ─────────────────────────────────────
# Buyer User Guide upload (Phase 12)
# Local disk storage; S3 is a follow-up.
# ─────────────────────────────────────
buyer-guide:
  upload-dir: ${BUYER_GUIDE_UPLOAD_DIR:uploads/buyer-user-guide}

auctions:
  lifecycle:
    enabled: ${AUCTIONS_LIFECYCLE_ENABLED:true}
    poll-ms: ${AUCTIONS_LIFECYCLE_POLL_MS:60000}
  # ─────────────────────────────────────
  # Auction status Snowflake push (Sub-project 1)
  # enabled=false → AuctionStatusSnowflakePushListener short-circuits before
  # any DB read; no payload is constructed and the writer is never invoked.
  # Flip enabled=true in QA/prod once the Snowflake-bound writer lands.
  # ─────────────────────────────────────
  snowflake-push:
    enabled: ${AUCTIONS_SNOWFLAKE_PUSH_ENABLED:false}
  # ─────────────────────────────────────
  # R1 initialization listener (Sub-project 2)
  # enabled=false → R1InitListener bean is not created; RoundStartedEvent(round=1)
  # is handled only by the stub. Flip enabled=true (default) so the real service
  # clamps target prices and seeds qualified_buyer_codes on every R1 transition.
  # ─────────────────────────────────────
  r1-init:
    enabled: ${AUCTIONS_R1_INIT_ENABLED:true}

---
# ─────────────────────────────────────
# Profile: local (override for dev convenience)
# Activate with: --spring.profiles.active=local
# ─────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
  flyway:
    validate-on-migrate: false   # skip checksum validation in local dev
auth:
  cookie:
    secure: false   # allow auth cookie over http://localhost during dev
server:
  error:
    include-message: always
    include-exception: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway,mappings
  endpoint:
    health:
      show-details: always

---
# ─────────────────────────────────────
# Profile: production
# Activate with: --spring.profiles.active=production
# ─────────────────────────────────────
spring:
  config:
    activate:
      on-profile: production
  flyway:
    out-of-order: false
    validate-on-migrate: true
  jpa:
    show-sql: false
auth:
  cookie:
    secure: true    # prod MUST serve over HTTPS
server:
  error:
    include-message: never
    include-exception: false

# ─────────────────────────────────────
# Sub-project 4A: ExchangeBid (EB) sync config
# ─────────────────────────────────────
eb:
  sync:
    enabled: true
    fixed-delay-ms: 1800000         # 30 min default pull cadence
    snowflake-timeout-seconds: 60
    writer: logging                  # switch to 'jdbc' for prod
    reader: logging                  # switch to 'jdbc' for prod
