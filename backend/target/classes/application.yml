spring:
  application:
    name: salesplatform

  # ─────────────────────────────────────
  # Local PostgreSQL (already running)
  # ─────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/salesplatform_dev
    username: ${DB_USERNAME:salesplatform}
    password: ${DB_PASSWORD:salesplatform}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  # ─────────────────────────────────────
  # JPA / Hibernate
  # validate = Hibernate checks entities match DB schema; never auto-creates
  # ─────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: identity   # default schema for @Entity classes unless overridden
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ─────────────────────────────────────
  # Flyway Migration
  # ─────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: true
    schemas: identity,user_mgmt,buyer_mgmt,sso,pws,mdm,integration
    default-schema: identity  # flyway_schema_history lives in identity (matches pom.xml)

# ─────────────────────────────────────
# Actuator (health checks)
# ─────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ─────────────────────────────────────
# Server
# ─────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never
    include-exception: false

# JWT
app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-must-be-at-least-32-bytes-long!!}
    expiration-ms: 86400000
    remember-me-expiration-ms: 604800000

---
# ─────────────────────────────────────
# Profile: local (override for dev convenience)
# Activate with: --spring.profiles.active=local
# ─────────────────────────────────────
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
  flyway:
    validate-on-migrate: false   # skip checksum validation in local dev
server:
  error:
    include-message: always
    include-exception: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,flyway,mappings
  endpoint:
    health:
      show-details: always
