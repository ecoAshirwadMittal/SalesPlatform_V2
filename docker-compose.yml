version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: salesplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: salesplatform_dev
      POSTGRES_USER: salesplatform
      POSTGRES_PASSWORD: salesplatform
      # Allow connections from all hosts inside docker network
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - salesplatform-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesplatform -d salesplatform_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB browsing (http://localhost:5050)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: salesplatform-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ecoatm.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - salesplatform-pgadmin:/var/lib/pgadmin

volumes:
  salesplatform-pgdata:
    driver: local
  salesplatform-pgadmin:
    driver: local
